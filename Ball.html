<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fafafa">
<title>BALLTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>
<style>
:root {
    /* Apple-style minimal palette */
    --bg: #fafafa;
    --bg-elev: #ffffff;
    --bg-elev-2: #f4f4f4;
    --bg-elev-3: #ececec;
    --border: #e5e5e5;
    --border-strong: #d4d4d4;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #a1a1a6;
    --accent: #1d1d1f;
    --accent-soft: #f2f2f2;
    --focus: #0071e3;
    --focus-soft: rgba(0, 113, 227, 0.1);
    --danger: #ff3b30;
    --star: #ff9500;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.08);
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
*:focus { outline: none; }

html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                 "Helvetica Neue", "Sukhumvit Set", "IBM Plex Sans Thai", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    letter-spacing: -0.01em;
}

.app {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    height: 100dvh;
}

/* ===== PLAYER ===== */
.player-col {
    display: flex;
    flex-direction: column;
    background: #000;
}
.player-wrap {
    position: relative;
    background: #000;
    width: 100%;
    aspect-ratio: 16 / 9;
    max-height: 50vh;
}
video {
    width: 100%; height: 100%;
    background: #000;
    display: block;
}
.player-overlay {
    position: absolute;
    left: 0; right: 0; top: 0;
    padding: 16px 18px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
    display: flex;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    z-index: 2;
}
.brand {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    margin-right: 4px;
}
.brand::before {
    content: "●";
    color: var(--danger);
    margin-right: 5px;
    font-size: 10px;
    vertical-align: 2px;
}
.now-name {
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* ===== QUICK CONTROLS ===== */
.quick-bar {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    align-items: center;
}
.qbtn {
    background: var(--bg-elev-2);
    border: 1px solid transparent;
    color: var(--text);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, transform 0.05s, border-color 0.15s;
    font-family: inherit;
    letter-spacing: -0.01em;
}
.qbtn:hover { background: var(--bg-elev-3); }
.qbtn:active { transform: scale(0.97); }
.qbtn:focus-visible { border-color: var(--focus); box-shadow: 0 0 0 3px var(--focus-soft); }
.qbtn.fav.active { background: #fff7e6; color: var(--star); }
.qbtn.edit.active { background: var(--text); color: #fff; }
.qbtn svg { width: 16px; height: 16px; }
.qbtn.icon-only { padding: 9px 10px; }
.qbtn.fs { margin-left: auto; }

/* ===== BROWSER ===== */
.browser {
    overflow: hidden;
    display: grid;
    grid-template-rows: auto auto 1fr;
    background: var(--bg);
}

.search-bar {
    padding: 14px 14px 6px;
    background: var(--bg);
}
.search-wrap {
    position: relative;
    display: flex;
    align-items: center;
}
.search-wrap svg.search-icon {
    position: absolute;
    left: 14px;
    width: 16px; height: 16px;
    color: var(--text-tertiary);
    pointer-events: none;
}
.search {
    width: 100%;
    padding: 11px 40px 11px 38px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-elev);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
}
.search:focus { border-color: var(--focus); box-shadow: 0 0 0 3px var(--focus-soft); }
.search::placeholder { color: var(--text-tertiary); }
.search-clear {
    position: absolute;
    right: 10px;
    background: var(--bg-elev-3);
    border: none;
    color: var(--text-secondary);
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
}
.search-clear.visible { display: inline-flex; }

/* ===== CATEGORY TABS ===== */
.tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 8px 14px 14px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    letter-spacing: -0.01em;
}
.tab .count {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 500;
}
.tab:hover { background: var(--bg-elev-2); color: var(--text); }
.tab.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
}
.tab.active .count { color: rgba(255,255,255,0.7); }
.tab:focus-visible { box-shadow: 0 0 0 3px var(--focus-soft); border-color: var(--focus); }

/* ===== GRID ===== */
.grid {
    overflow-y: auto;
    padding: 4px 14px calc(20px + var(--safe-bottom));
    -webkit-overflow-scrolling: touch;
}
.grid-inner {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
    gap: 10px;
}
.card {
    position: relative;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: transform 0.1s, box-shadow 0.15s, border-color 0.15s;
    overflow: hidden;
}
.card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--border-strong);
}
.card:active { transform: scale(0.97); }
.card:focus-visible {
    border-color: var(--focus);
    box-shadow: 0 0 0 3px var(--focus-soft), var(--shadow-md);
}
.card.playing {
    border-color: var(--text);
    background: var(--bg-elev);
    box-shadow: var(--shadow-md);
}
.logo-box {
    width: 60px;
    height: 60px;
    border-radius: 13px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
}
.logo-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
.logo-box .fallback {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: -0.02em;
}
.card-name {
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    line-height: 1.3;
    color: var(--text);
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    min-height: 32px;
    letter-spacing: -0.01em;
}
.card-group {
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-weight: 500;
}

/* corner buttons on card */
.card-action {
    position: absolute;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, transform 0.1s, background 0.15s;
    z-index: 2;
    padding: 0;
}
.card-action svg { width: 13px; height: 13px; }
.fav-star { top: 8px; right: 8px; }
.fav-star.active { color: var(--star); background: #fff7e6; border-color: #ffe4b8; }
.del-btn { top: 8px; left: 8px; color: var(--danger); display: none; border-color: #ffd5d2; background: #fff5f5; }
body.editing .del-btn { display: flex; }
body.editing .fav-star { display: none; }
body.editing .card { animation: wiggle 0.5s ease-in-out infinite alternate; }
@keyframes wiggle {
    0% { transform: rotate(-0.4deg); }
    100% { transform: rotate(0.4deg); }
}
.card-action:active { transform: scale(0.85); }

.playing-dot {
    position: absolute;
    bottom: 8px; right: 8px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--danger);
    display: none;
    box-shadow: 0 0 0 3px rgba(255,59,48,0.15);
    animation: pulse 1.5s infinite;
}
.card.playing .playing-dot { display: block; }
@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(255,59,48,0.15); }
    50% { box-shadow: 0 0 0 6px rgba(255,59,48,0.05); }
}

.empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-secondary);
    padding: 60px 20px;
    font-size: 14px;
}
.empty strong { display: block; font-size: 16px; color: var(--text); margin-bottom: 6px; font-weight: 600; }

/* ===== EDIT MODE BANNER ===== */
.edit-banner {
    display: none;
    background: var(--text);
    color: #fff;
    padding: 10px 14px;
    font-size: 13px;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}
body.editing .edit-banner { display: flex; }
.edit-banner .done {
    background: #fff;
    color: var(--text);
    border: none;
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
}
.edit-banner .restore {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 12px;
    border-radius: 999px;
    font-weight: 500;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
}

/* ===== HEALTH STATUS COLORS ===== */
:root {
    --ok: #34c759;
    --warn: #ff9500;
    --bad: #ff3b30;
    --checking: #0071e3;
}

/* ===== STATUS PILL (in player overlay) ===== */
.status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    color: #fff;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    white-space: nowrap;
    transition: background 0.2s;
}
.status-pill::before {
    content: "";
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ok);
}
.status-pill.s-ok::before { background: var(--ok); }
.status-pill.s-recovering { background: rgba(0,113,227,0.55); }
.status-pill.s-recovering::before { background: #fff; animation: pulse-check 0.8s infinite; }
@keyframes pulse-check { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.status-pill.s-bad { background: rgba(255,59,48,0.55); }
.status-pill.s-bad::before { background: #fff; }

/* ===== RECOVERY OVERLAY (center of player) ===== */
.recovery {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(3px);
    z-index: 3;
    color: #fff;
    text-align: center;
    padding: 24px;
}
.recovery.visible { display: flex; }
.recovery .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.recovery .r-title { font-size: 15px; font-weight: 600; }
.recovery .r-sub { font-size: 12px; color: rgba(255,255,255,0.7); max-width: 280px; line-height: 1.4; }
.recovery .r-actions { display: none; gap: 10px; margin-top: 4px; }
.recovery.failed .spinner { display: none; }
.recovery.failed .r-actions { display: flex; }
.recovery .r-btn {
    background: #fff;
    color: #1d1d1f;
    border: none;
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
}
.recovery .r-btn.ghost {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
}
.recovery .r-icon { font-size: 32px; }

.modal-mask.visible { display: flex; }
.modal {
    background: var(--bg-elev);
    border-radius: 16px;
    padding: 22px 24px;
    max-width: 320px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    text-align: center;
}
.modal h3 {
    margin: 0 0 8px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
}
.modal p {
    margin: 0 0 18px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
}
.modal-actions {
    display: flex;
    gap: 8px;
}
.modal-actions button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-elev-2);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
}
.modal-actions .danger {
    background: var(--danger);
    color: #fff;
    border-color: var(--danger);
}

/* Toast */
.toast {
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
    box-shadow: var(--shadow-lg);
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ===== TV / DESKTOP LAYOUT ===== */
@media (min-width: 900px) {
    .app {
        grid-template-columns: 1fr 440px;
        grid-template-rows: 1fr;
    }
    .player-col {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #000;
    }
    .player-wrap {
        aspect-ratio: auto;
        max-height: none;
        flex: 1;
    }
    .browser {
        border-left: 1px solid var(--border);
        height: 100vh;
        height: 100dvh;
        background: var(--bg-elev);
    }
    .grid-inner {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    }
}

/* TV (large screen, 10ft UI tweaks) */
@media (min-width: 1280px) {
    .app { grid-template-columns: 1fr 520px; }
    .qbtn { padding: 11px 16px; font-size: 14px; }
    .tab { padding: 9px 16px; font-size: 14px; }
    .card { padding: 16px 10px 12px; }
    .logo-box { width: 72px; height: 72px; }
    .card-name { font-size: 13px; }
    .grid-inner { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
}

/* very small */
@media (max-width: 380px) {
    .grid-inner { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .logo-box { width: 52px; height: 52px; }
    .card-name { font-size: 11px; }
}
</style>
</head>
<body>

<div class="app">
    <div class="player-col">
        <div class="player-wrap">
            <div class="player-overlay">
                <span class="brand">BALLTV</span>
                <span class="now-name" id="nowName">-</span>
                <span class="status-pill s-ok" id="statusPill" style="margin-left:auto; display:none">เล่นอยู่</span>
            </div>
            <div class="recovery" id="recovery">
                <div class="spinner"></div>
                <div class="r-icon" style="display:none">⚠️</div>
                <div class="r-title" id="recoveryTitle">กำลังเชื่อมต่อใหม่…</div>
                <div class="r-sub" id="recoverySub">ช่องสะดุด กำลังโหลดให้อัตโนมัติ</div>
                <div class="r-actions">
                    <button class="r-btn" id="retryBtn">ลองใหม่</button>
                    <button class="r-btn ghost" id="nextChBtn">ช่องถัดไป</button>
                </div>
            </div>
            <video id="video" controls autoplay playsinline></video>
        </div>
        <div class="quick-bar">
            <button class="qbtn icon-only" id="prevBtn" title="ก่อนหน้า" aria-label="ช่องก่อนหน้า">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="qbtn icon-only" id="nextBtn" title="ถัดไป" aria-label="ช่องถัดไป">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <button class="qbtn fav" id="favBtn">
                <svg id="favIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span id="favLabel">โปรด</span>
            </button>
            <button class="qbtn edit" id="editBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                <span id="editLabel">แก้ไข</span>
            </button>
            <button class="qbtn fs icon-only" id="fsBtn" title="เต็มจอ" aria-label="เต็มจอ">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
        </div>
    </div>

    <div class="browser">
        <div class="edit-banner">
            <span>กดเครื่องหมายลบที่ช่องเพื่อซ่อน</span>
            <div style="display:flex; gap:8px">
                <button class="restore" id="restoreBtn">คืนช่อง</button>
                <button class="done" id="doneEditBtn">เสร็จ</button>
            </div>
        </div>
        <div class="search-bar">
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input class="search" type="text" id="search" placeholder="ค้นหาช่อง" autocomplete="off">
                <button class="search-clear" id="searchClear" aria-label="ล้าง">✕</button>
            </div>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="grid">
            <div class="grid-inner" id="grid"></div>
        </div>
    </div>
</div>

<div class="modal-mask" id="confirmModal">
    <div class="modal">
        <h3 id="modalTitle">ลบช่องนี้?</h3>
        <p id="modalBody">ช่องนี้จะถูกซ่อน คุณสามารถคืนได้ในโหมดแก้ไข</p>
        <div class="modal-actions">
            <button id="modalCancel">ยกเลิก</button>
            <button class="danger" id="modalConfirm">ลบ</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== Data + Storage ======
const FAV_KEY = 'balltv_favs_v1';

// ====== Tabs ======
const tabsEl = document.getElementById('tabs');
function renderTabs() {
    const groups = {};
    channels.forEach(c => { groups[c.group] = (groups[c.group] || 0) + 1; });

    tabsEl.innerHTML = '';
    const order = [
        ['FAV', '⭐ โปรด', [...favs].filter(u => !hidden.has(u)).length],
        ['ALL', 'ทั้งหมด', channels.length],
        ...Object.keys(groups).map(g => [g, (groupIcons[g] || '') + ' ' + g, groups[g]])
    ];
    order.forEach(([key, label, count]) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (key === activeGroup ? ' active' : '');
        btn.innerHTML = `<span>${label}</span><span class="count">${count}</span>`;
        btn.onclick = () => { activeGroup = key; renderTabs(); renderGrid(); };
        tabsEl.appendChild(btn);
    });
}

    const q = searchText.trim().toLowerCase();
    let list = channels;
    if (activeGroup === 'FAV') list = list.filter(c => favs.has(c.url));
    else if (activeGroup !== 'ALL') list = list.filter(c => c.group === activeGroup);
    if (q) list = list.filter(c => c.name.toLowerCase().includes(q));
    return list;
}

function renderGrid() {
    const list = getFilteredList();
    if (list.length === 0) {
        gridEl.innerHTML = `<div class="empty">
            ${activeGroup === 'FAV' && !searchText
                ? '<strong>ยังไม่มีช่องโปรด</strong>กดดาวที่ช่องเพื่อบันทึก'
                : '<strong>ไม่พบช่อง</strong>ลองค้นด้วยคำอื่น'}
        </div>`;
        return;
    }
    gridEl.innerHTML = '';
    const frag = document.createDocumentFragment();
    list.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'card' + (ch.url === currentUrl ? ' playing' : '');
        card.tabIndex = 0;
        const isFav = favs.has(ch.url);
        const initial = (ch.name || '?').trim().charAt(0).toUpperCase();
        card.innerHTML = `
            <button class="card-action del-btn" aria-label="ลบช่อง">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button class="card-action fav-star ${isFav ? 'active' : ''}" aria-label="ช่องโปรด">
                <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
            <div class="logo-box">
                ${ch.logo ? `<img src="${ch.logo}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'fallback\\'>${initial}</span>'">` : `<span class="fallback">${initial}</span>`}
            </div>
            <div class="card-name">${ch.name}</div>
            <div class="card-group">${ch.group}</div>
            <div class="playing-dot"></div>
        `;
        card.onclick = (e) => {
            if (e.target.closest('.card-action')) return;
            if (editing) { askDelete(ch); return; }
            playStream(ch);
        };
        card.onkeydown = (e) => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
        };
        card.querySelector('.fav-star').onclick = (e) => {
            e.stopPropagation();
            toggleFav(ch.url);
        };
        card.querySelector('.del-btn').onclick = (e) => {
            e.stopPropagation();
            askDelete(ch);
        };
        frag.appendChild(card);
    });
    gridEl.appendChild(frag);
}

// ====== Favorites ======
function toggleFav(url) {
    if (favs.has(url)) favs.delete(url); else favs.add(url);
    saveFavs();
    renderTabs();
    renderGrid();
    updateFavBtn();
}
function updateFavBtn() {
    const btn = document.getElementById('favBtn');
    const icon = document.getElementById('favIcon');
    const label = document.getElementById('favLabel');
    const isFav = currentUrl && favs.has(currentUrl);
    btn.classList.toggle('active', isFav);
    icon.setAttribute('fill', isFav ? 'currentColor' : 'none');
    label.textContent = isFav ? 'ลบจากโปรด' : 'โปรด';
}
document.getElementById('favBtn').onclick = () => {
    if (currentUrl) toggleFav(currentUrl);
};

// ====== Edit mode ======
const editBtn = document.getElementById('editBtn');
const editLabel = document.getElementById('editLabel');
const doneEditBtn = document.getElementById('doneEditBtn');
const restoreBtn = document.getElementById('restoreBtn');

function setEditing(v) {
    editing = v;
    document.body.classList.toggle('editing', editing);
    editBtn.classList.toggle('active', editing);
    editLabel.textContent = editing ? 'เสร็จ' : 'แก้ไข';
}
editBtn.onclick = () => setEditing(!editing);
doneEditBtn.onclick = () => setEditing(false);
restoreBtn.onclick = () => {
    if (hidden.size === 0) { toast('ไม่มีช่องที่ถูกซ่อน'); return; }
    hidden.clear();
    saveHidden();
    rebuildVisible();
    renderTabs();
    renderGrid();
    toast('คืนช่องทั้งหมดแล้ว');
};

// ====== Delete confirm modal ======
const modal = document.getElementById('confirmModal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
let pendingDelete = null;
function askDelete(ch) {
    pendingDelete = ch;
    modalTitle.textContent = 'ซ่อนช่อง ' + ch.name + '?';
    modalBody.textContent = 'ช่องนี้จะไม่แสดง คุณสามารถกด "คืนช่อง" เพื่อเอากลับมาได้';
    modal.classList.add('visible');
}
document.getElementById('modalCancel').onclick = () => {
    modal.classList.remove('visible');
    pendingDelete = null;
};
document.getElementById('modalConfirm').onclick = () => {
    if (pendingDelete) {
        hidden.add(pendingDelete.url);
        saveHidden();
        if (currentUrl === pendingDelete.url) {
            // play next available
            const list = channels.filter(c => c.url !== pendingDelete.url);
            if (list.length) playStream(list[0]);
        }
        rebuildVisible();
        renderTabs();
        renderGrid();
        toast('ซ่อนแล้ว');
    }
    modal.classList.remove('visible');
    pendingDelete = null;
};
modal.onclick = (e) => { if (e.target === modal) document.getElementById('modalCancel').click(); };

// ====== Toast ======
const toastEl = document.getElementById('toast');
let toastTimer;
function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
}

// ====== Search ======
const searchEl = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
searchEl.oninput = (e) => {
    searchText = e.target.value;
    searchClear.classList.toggle('visible', searchText.length > 0);
    renderGrid();
};
searchClear.onclick = () => {
    searchEl.value = '';
    searchText = '';
    searchClear.classList.remove('visible');
    renderGrid();
    searchEl.focus();
};

// ====== Player ======
const video = document.getElementById('video');
const nowName = document.getElementById('nowName');

// ====== Player + Auto Recovery ======
const statusPill = document.getElementById('statusPill');
const recoveryEl = document.getElementById('recovery');
const recoveryTitle = document.getElementById('recoveryTitle');
const recoverySub = document.getElementById('recoverySub');
const recoveryIcon = recoveryEl.querySelector('.r-icon');
const recoverySpinner = recoveryEl.querySelector('.spinner');

const MAX_AUTO_RETRY = 4;     // ลองเองกี่ครั้งก่อนยอมแพ้
const STALL_TIMEOUT = 9000;   // ค้างนานเกินกี่ ms ถือว่าสะดุด
const LOAD_TIMEOUT = 12000;   // โหลดครั้งแรกนานเกินกี่ ms ถือว่าต้นทางไม่ตอบ

let retryCount = 0;
let stallTimer = null;
let loadTimer = null;
let lastPlayPos = 0;
let lastPosCheck = 0;
let recovering = false;
let watchdog = null;

function setStatus(state, text) {
    statusPill.style.display = 'inline-flex';
    statusPill.className = 'status-pill ' + state;
    statusPill.textContent = text;
}
function clearTimers() {
    clearTimeout(stallTimer); stallTimer = null;
    clearTimeout(loadTimer); loadTimer = null;
    clearInterval(watchdog); watchdog = null;
}

function showRecovery(mode, ch) {
    recoveryEl.classList.add('visible');
    if (mode === 'recovering') {
        recoveryEl.classList.remove('failed');
        recoverySpinner.style.display = 'block';
        recoveryIcon.style.display = 'none';
        recoveryTitle.textContent = 'กำลังเชื่อมต่อใหม่…';
        recoverySub.textContent = `ช่องสะดุด กำลังลองโหลดอัตโนมัติ (ครั้งที่ ${retryCount}/${MAX_AUTO_RETRY})`;
        setStatus('s-recovering', 'เชื่อมต่อใหม่…');
    } else if (mode === 'failed-source') {
        recoveryEl.classList.add('failed');
        recoveryIcon.style.display = 'block';
        recoveryTitle.textContent = 'ช่องนี้มีปัญหาที่ต้นทาง';
        recoverySub.textContent = 'เน็ตของคุณปกติ แต่เซิร์ฟเวอร์ของช่องนี้ไม่ตอบสนองหรือหยุดส่งสัญญาณ ลองช่องอื่นหรือกดลองใหม่ภายหลัง';
        setStatus('s-bad', 'ต้นทางมีปัญหา');
    } else if (mode === 'failed-network') {
        recoveryEl.classList.add('failed');
        recoveryIcon.style.display = 'block';
        recoveryTitle.textContent = 'เชื่อมต่ออินเทอร์เน็ตไม่ได้';
        recoverySub.textContent = 'ดูเหมือนเน็ตของคุณหลุดหรือช้ามาก ตรวจสอบ Wi-Fi/สายแลนแล้วลองใหม่';
        setStatus('s-bad', 'เน็ตมีปัญหา');
    }
}
function hideRecovery() {
    recoveryEl.classList.remove('visible', 'failed');
}

// เช็คว่าเน็ตเราออกได้ไหม (ping เบา ๆ ไปเว็บที่เสถียร)
async function checkOurInternet() {
    const tryUrls = [
        'https://www.gstatic.com/generate_204',
        'https://www.cloudflare.com/cdn-cgi/trace'
    ];
    for (const u of tryUrls) {
        try {
            const ctrl = new AbortController();
            const t = setTimeout(() => ctrl.abort(), 4000);
            await fetch(u, { mode: 'no-cors', cache: 'no-store', signal: ctrl.signal });
            clearTimeout(t);
            return true; // ออกเน็ตได้
        } catch (e) { /* try next */ }
    }
    return false; // เน็ตเรามีปัญหา
}

async function handleFailure(ch) {
    // เรียกเมื่อ auto-retry หมดแล้ว — วินิจฉัยว่าเป็นที่เน็ตเราหรือต้นทาง
    const online = await checkOurInternet();
    if (!online) showRecovery('failed-network', ch);
    else showRecovery('failed-source', ch);
}

function attemptRecover(ch, reason) {
    if (recovering) return;
    if (currentUrl !== ch.url) return; // เปลี่ยนช่องไปแล้ว ไม่ต้องกู้
    recovering = true;
    retryCount++;
    if (retryCount > MAX_AUTO_RETRY) {
        recovering = false;
        clearTimers();
        handleFailure(ch);
        return;
    }
    showRecovery('recovering', ch);
    // โหลด stream ใหม่
    setTimeout(() => {
        recovering = false;
        if (currentUrl === ch.url) loadInto(ch, true);
    }, 800);
}

function startWatchdog(ch) {
    clearInterval(watchdog);
    lastPlayPos = video.currentTime;
    lastPosCheck = Date.now();
    watchdog = setInterval(() => {
        if (currentUrl !== ch.url) { clearInterval(watchdog); return; }
        if (video.paused) return; // ผู้ใช้กด pause เอง ไม่นับ
        const now = Date.now();
        const moved = video.currentTime - lastPlayPos;
        if (moved > 0.1) {
            // วิดีโอเดินหน้าปกติ -> healthy
            lastPlayPos = video.currentTime;
            lastPosCheck = now;
            if (!recovering && recoveryEl.classList.contains('visible')) {
                hideRecovery();
            }
            if (!recovering) {
                retryCount = 0;
                setStatus('s-ok', 'เล่นอยู่');
            }
        } else if (now - lastPosCheck > STALL_TIMEOUT) {
            // เวลาวิ่งไม่ไปเกิน threshold -> ค้าง
            lastPosCheck = now;
            attemptRecover(ch, 'stall');
        }
    }, 1500);
}

function loadInto(ch, isRetry) {
    clearTimers();
    if (hls) { try { hls.destroy(); } catch(e){} hls = null; }

    // ตั้ง timeout สำหรับการโหลดครั้งแรก
    loadTimer = setTimeout(() => {
        attemptRecover(ch, 'load-timeout');
    }, LOAD_TIMEOUT);

    if (window.Hls && Hls.isSupported()) {
        hls = new Hls({
            enableWorker: true,
            lowLatencyMode: false,
            manifestLoadingTimeOut: 10000,
            manifestLoadingMaxRetry: 1,
            levelLoadingTimeOut: 10000,
            fragLoadingTimeOut: 20000
        });
        hls.loadSource(ch.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            clearTimeout(loadTimer); loadTimer = null;
            video.play().catch(()=>{});
        });
        hls.on(Hls.Events.FRAG_BUFFERED, () => {
            clearTimeout(loadTimer); loadTimer = null;
        });
        hls.on(Hls.Events.ERROR, (e, data) => {
            if (!data.fatal) return;
            // ลองให้ HLS recover เองก่อนสำหรับ error เบา ๆ
            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                try { hls.recoverMediaError(); return; } catch(err){}
            }
            attemptRecover(ch, 'hls-fatal');
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = ch.url;
        video.play().catch(()=>{});
        video.addEventListener('loadeddata', () => {
            clearTimeout(loadTimer); loadTimer = null;
        }, { once: true });
        video.addEventListener('error', () => attemptRecover(ch, 'native-error'), { once: true });
    }
    startWatchdog(ch);
}

function playStream(ch) {
    clearTimers();
    currentUrl = ch.url;
    nowName.textContent = ch.name;
    document.title = ch.name + ' • BALLTV';
    localStorage.setItem(LAST_KEY, ch.url);

    retryCount = 0;
    recovering = false;
    hideRecovery();
    setStatus('s-ok', 'กำลังโหลด…');

    loadInto(ch, false);
    updateFavBtn();
    renderGrid();
}

// video event hooks for status
video.addEventListener('waiting', () => {
    if (!recovering) setStatus('s-recovering', 'กำลังบัฟเฟอร์…');
});
video.addEventListener('playing', () => {
    if (!recovering) { setStatus('s-ok', 'เล่นอยู่'); }
});
video.addEventListener('stalled', () => {
    const ch = channels.find(c => c.url === currentUrl);
    if (ch) attemptRecover(ch, 'stalled-event');
});

// ปุ่มในหน้า recovery
document.getElementById('retryBtn').onclick = () => {
    const ch = channels.find(c => c.url === currentUrl);
    if (ch) { retryCount = 0; playStream(ch); }
};
document.getElementById('nextChBtn').onclick = () => {
    document.getElementById('nextBtn').click();
};

// ====== Prev / Next ======
function getCurrentNavList() {
    const list = getFilteredList();
    return list.length ? list : channels;
}
document.getElementById('prevBtn').onclick = () => {
    const list = getCurrentNavList();
    const idx = list.findIndex(c => c.url === currentUrl);
    const next = list[(idx - 1 + list.length) % list.length];
    if (next) playStream(next);
};
document.getElementById('nextBtn').onclick = () => {
    const list = getCurrentNavList();
    const idx = list.findIndex(c => c.url === currentUrl);
    const next = list[(idx + 1) % list.length];
    if (next) playStream(next);
};

// ====== Fullscreen ======
document.getElementById('fsBtn').onclick = () => {
    const el = document.querySelector('.player-wrap');
    if (!document.fullscreenElement) {
        const fn = el.requestFullscreen || el.webkitRequestFullscreen;
        if (fn) fn.call(el).catch(()=>{});
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    } else {
        document.exitFullscreen?.();
    }
};

// ====== Keyboard / TV Remote ======
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    const k = e.key;
    if (k === 'ArrowRight' && (e.ctrlKey || e.shiftKey)) { e.preventDefault(); document.getElementById('nextBtn').click(); }
    else if (k === 'ArrowLeft' && (e.ctrlKey || e.shiftKey)) { e.preventDefault(); document.getElementById('prevBtn').click(); }
    else if (k === 'MediaTrackNext' || k === 'ChannelUp') { e.preventDefault(); document.getElementById('nextBtn').click(); }
    else if (k === 'MediaTrackPrevious' || k === 'ChannelDown') { e.preventDefault(); document.getElementById('prevBtn').click(); }
    else if (k === 'f' || k === 'F') document.getElementById('fsBtn').click();
    else if (k === '/') { e.preventDefault(); searchEl.focus(); }
});

// ====== Init ======
(async () => {
    await loadChannels();
    renderTabs();
    renderGrid();
    const lastUrl = localStorage.getItem(LAST_KEY);
    const startCh = channels.find(c => c.url === lastUrl) || channels[0];
    if (startCh) playStream(startCh);
})();
</script>
