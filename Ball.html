<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>NOOM IPTV PLAYER</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root {
    --bg: #0a0a0a;
    --bg-elev: #161616;
    --bg-elev-2: #1f1f1f;
    --bg-elev-3: #2a2a2a;
    --border: #2a2a2a;
    --text: #f5f5f5;
    --text-dim: #9a9a9a;
    --text-dimmer: #6a6a6a;
    --accent: #ff3b30;
    --accent-soft: rgba(255, 59, 48, 0.15);
    --star: #ffcc00;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sukhumvit Set", "IBM Plex Sans Thai", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
}

.app {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    height: 100dvh;
}

/* ===== Top: Player ===== */
.player-wrap {
    position: relative;
    background: #000;
    width: 100%;
    aspect-ratio: 16 / 9;
    max-height: 50vh;
}
video {
    width: 100%;
    height: 100%;
    background: #000;
    display: block;
}
.player-overlay {
    position: absolute;
    left: 0; right: 0; top: 0;
    padding: 12px 14px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    display: flex;
    align-items: center;
    gap: 10px;
    pointer-events: none;
    z-index: 2;
}
.now-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
}
.now-badge::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: blink 1.4s infinite;
}
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.3; } }
.now-name {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* Quick controls under player */
.quick-bar {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    align-items: center;
}
.qbtn {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, transform 0.05s;
}
.qbtn:hover { background: var(--bg-elev-3); }
.qbtn:active { transform: scale(0.96); }
.qbtn.fav.active { background: var(--star); color: #000; border-color: var(--star); }
.qbtn svg { width: 18px; height: 18px; }
.qbtn.icon-only { padding: 8px 10px; }

/* ===== Bottom: Browser ===== */
.browser {
    overflow: hidden;
    display: grid;
    grid-template-rows: auto auto 1fr;
    background: var(--bg);
}

.search-bar {
    padding: 10px 12px;
    background: var(--bg);
    position: sticky; top: 0;
    z-index: 5;
}
.search-wrap {
    position: relative;
    display: flex;
    align-items: center;
}
.search-wrap svg.search-icon {
    position: absolute;
    left: 12px;
    width: 18px; height: 18px;
    color: var(--text-dim);
    pointer-events: none;
}
.search {
    width: 100%;
    padding: 12px 40px 12px 40px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg-elev);
    color: var(--text);
    font-size: 15px;
    outline: none;
}
.search:focus { border-color: var(--accent); }
.search-clear {
    position: absolute;
    right: 8px;
    background: var(--bg-elev-3);
    border: none;
    color: var(--text);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
}
.search-clear.visible { display: inline-flex; }

/* Category tabs */
.tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 12px 12px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.tab .count {
    background: var(--bg-elev-3);
    color: var(--text-dim);
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 700;
}
.tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
}
.tab.active .count { background: rgba(255,255,255,0.25); color: #fff; }
.tab.fav-tab .star { color: var(--star); }

/* Channel grid */
.grid {
    overflow-y: auto;
    padding: 4px 12px calc(20px + var(--safe-bottom));
    -webkit-overflow-scrolling: touch;
}
.grid-inner {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
}
.card {
    position: relative;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 8px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: transform 0.08s, background 0.15s, border-color 0.15s;
    overflow: hidden;
}
.card:hover { background: var(--bg-elev-2); }
.card:active { transform: scale(0.96); }
.card.playing {
    border-color: var(--accent);
    background: var(--accent-soft);
}
.card.playing::before {
    content: "";
    position: absolute;
    inset: 0;
    border: 2px solid var(--accent);
    border-radius: 14px;
    pointer-events: none;
}
.logo-box {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
    overflow: hidden;
}
.logo-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
.logo-box .fallback {
    font-size: 22px;
    font-weight: 800;
    color: #333;
}
.card-name {
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    line-height: 1.25;
    color: var(--text);
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    min-height: 30px;
}
.card-group {
    font-size: 10px;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.3px;
}
.fav-star {
    position: absolute;
    top: 6px; right: 6px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    border: none;
    color: var(--text-dimmer);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, transform 0.1s;
    z-index: 2;
}
.fav-star svg { width: 14px; height: 14px; }
.fav-star.active { color: var(--star); }
.fav-star:active { transform: scale(0.85); }
.playing-indicator {
    position: absolute;
    top: 6px; left: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    display: none;
    letter-spacing: 0.5px;
}
.card.playing .playing-indicator { display: block; }

.empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 14px;
}

/* Desktop layout: side-by-side */
@media (min-width: 900px) {
    .app {
        grid-template-columns: 1fr 420px;
        grid-template-rows: 1fr;
    }
    .player-col {
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .player-wrap {
        aspect-ratio: auto;
        max-height: none;
        flex: 1;
    }
    .browser {
        border-left: 1px solid var(--border);
        height: 100vh;
        height: 100dvh;
    }
    .grid-inner {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    }
}

/* Very small screens */
@media (max-width: 380px) {
    .grid-inner { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .logo-box { width: 54px; height: 54px; }
    .card-name { font-size: 11px; }
}
</style>
</head>

<div class="app">

    <div class="browser">

            <div class="search-wrap">

        </div>
        <div class="tabs" id="tabs"></div>
        <div class="grid">
            <div class="grid-inner" id="grid"></div>
        </div>
    </div>
</div>

// ---- State ----
const FAV_KEY = 'noom_iptv_favs_v1';
const LAST_KEY = 'noom_iptv_last_v1';
let favs = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));
let activeGroup = 'ALL';
let searchText = '';
let currentUrl = null;
let hls = null;

// Build group counts
const groups = {};
channels.forEach(c => { groups[c.group] = (groups[c.group] || 0) + 1; });

// Group icons (emoji for simplicity)
const groupIcons = {
    'Thai TV': '📺',
    'Sports': '⚽',
    'Movies': '🎬',
    'News': '📰',
    'Documentary': '🌍',
    'Kids': '🧸',
    'Entertainment': '🎭',
    'Premium': '⭐',
    'Football': '🏆'
};

// ---- Render tabs ----
const tabsEl = document.getElementById('tabs');
function renderTabs() {
    tabsEl.innerHTML = '';
    const order = [
        ['FAV', '⭐ ช่องโปรด', favs.size],
        ['ALL', 'ทั้งหมด', channels.length],
        ...Object.keys(groups).map(g => [g, (groupIcons[g] || '') + ' ' + g, groups[g]])
    ];
    order.forEach(([key, label, count]) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (key === activeGroup ? ' active' : '') + (key === 'FAV' ? ' fav-tab' : '');
        btn.innerHTML = `<span>${label}</span><span class="count">${count}</span>`;
        btn.onclick = () => { activeGroup = key; renderTabs(); renderGrid(); };
        tabsEl.appendChild(btn);
    });
}

// ---- Render grid ----
const gridEl = document.getElementById('grid');
function renderGrid() {
    const q = searchText.trim().toLowerCase();
    let list = channels;
    if (activeGroup === 'FAV') {
        list = list.filter(c => favs.has(c.url));
    } else if (activeGroup !== 'ALL') {
        list = list.filter(c => c.group === activeGroup);
    }
    if (q) list = list.filter(c => c.name.toLowerCase().includes(q));

    if (list.length === 0) {
        gridEl.innerHTML = `<div class="empty">${activeGroup === 'FAV' && !q ? '⭐ ยังไม่มีช่องโปรด<br><small>กดดาวที่ช่องเพื่อบันทึก</small>' : 'ไม่พบช่อง'}</div>`;
        return;
    }

    gridEl.innerHTML = '';
    const frag = document.createDocumentFragment();
    list.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'card' + (ch.url === currentUrl ? ' playing' : '');
        const isFav = favs.has(ch.url);
        const initial = (ch.name || '?').trim().charAt(0).toUpperCase();
        card.innerHTML = `
            <div class="playing-indicator">▶ กำลังเล่น</div>
            <button class="fav-star ${isFav ? 'active' : ''}" aria-label="ช่องโปรด">
                <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
            <div class="logo-box">
                ${ch.logo ? `<img src="${ch.logo}" onerror="this.parentElement.innerHTML='<span class=\'fallback\'>${initial}</span>'">` : `<span class="fallback">${initial}</span>`}
            </div>
            <div class="card-name">${ch.name}</div>
            <div class="card-group">${ch.group}</div>
        `;
        card.onclick = (e) => {
            if (e.target.closest('.fav-star')) return;
            playStream(ch);
        };
        card.querySelector('.fav-star').onclick = (e) => {
            e.stopPropagation();
            toggleFav(ch.url);
        };
        frag.appendChild(card);
    });
    gridEl.appendChild(frag);
}

// ---- Favorites ----
function toggleFav(url) {
    if (favs.has(url)) favs.delete(url); else favs.add(url);
    localStorage.setItem(FAV_KEY, JSON.stringify([...favs]));
    renderTabs();
    renderGrid();
    updateFavBtn();
}
function updateFavBtn() {
    const btn = document.getElementById('favBtn');
    const icon = document.getElementById('favIcon');
    const label = document.getElementById('favLabel');
    const isFav = currentUrl && favs.has(currentUrl);
    btn.classList.toggle('active', isFav);
    icon.setAttribute('fill', isFav ? 'currentColor' : 'none');
    label.textContent = isFav ? 'ลบจากโปรด' : 'ช่องโปรด';
}
document.getElementById('favBtn').onclick = () => {
    if (currentUrl) toggleFav(currentUrl);
};

// ---- Search ----
const searchEl = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
searchEl.oninput = (e) => {
    searchText = e.target.value;
    searchClear.classList.toggle('visible', searchText.length > 0);
    renderGrid();
};
searchClear.onclick = () => {
    searchEl.value = '';
    searchText = '';
    searchClear.classList.remove('visible');
    renderGrid();
    searchEl.focus();
};

// ---- Player ----
const video = document.getElementById('video');
const nowName = document.getElementById('nowName');

function playStream(ch) {
    currentUrl = ch.url;
    nowName.textContent = ch.name;
    document.title = ch.name + ' • NOOM IPTV';
    localStorage.setItem(LAST_KEY, ch.url);

    if (hls) { hls.destroy(); hls = null; }

    if (Hls.isSupported()) {
        hls = new Hls({ enableWorker: true, lowLatencyMode: false });
        hls.loadSource(ch.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
        hls.on(Hls.Events.ERROR, (e, data) => {
            if (data.fatal) console.warn('HLS error', data);
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = ch.url;
        video.play().catch(()=>{});
    }
    updateFavBtn();
    renderGrid();
}

// ---- Prev / Next ----
function getCurrentList() {
    // Use the same filter as grid for prev/next, so it feels intuitive
    const q = searchText.trim().toLowerCase();
    let list = channels;
    if (activeGroup === 'FAV') list = list.filter(c => favs.has(c.url));
    else if (activeGroup !== 'ALL') list = list.filter(c => c.group === activeGroup);
    if (q) list = list.filter(c => c.name.toLowerCase().includes(q));
    return list.length ? list : channels;
}
document.getElementById('prevBtn').onclick = () => {
    const list = getCurrentList();
    const idx = list.findIndex(c => c.url === currentUrl);
    const next = list[(idx - 1 + list.length) % list.length];
    if (next) playStream(next);
};
document.getElementById('nextBtn').onclick = () => {
    const list = getCurrentList();
    const idx = list.findIndex(c => c.url === currentUrl);
    const next = list[(idx + 1) % list.length];
    if (next) playStream(next);
};

// ---- Fullscreen ----
document.getElementById('fsBtn').onclick = () => {
    const el = document.querySelector('.player-wrap');
    if (!document.fullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen || video.webkitEnterFullscreen)?.call(el.requestFullscreen ? el : video);
    } else {
        document.exitFullscreen?.();
    }
};

// ---- Keyboard shortcuts (desktop) ----
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'n') document.getElementById('nextBtn').click();
    else if (e.key === 'ArrowLeft' || e.key === 'p') document.getElementById('prevBtn').click();
    else if (e.key === 'f') document.getElementById('fsBtn').click();
    else if (e.key === '/') { e.preventDefault(); searchEl.focus(); }
});

// ---- Init ----
renderTabs();
renderGrid();
const lastUrl = localStorage.getItem(LAST_KEY);
const startCh = channels.find(c => c.url === lastUrl) || channels[0];
playStream(startCh);
</script>
</body>
</html>
